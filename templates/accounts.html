<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f9fb;
        }
        .header {
            background-color: #007BFF;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .card {
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #28a745;
            color: white;
        }
        .form-control {
            border-radius: 8px;
        }
        .btn-save {
            background-color: #28a745;
            color: white;
            border-radius: 8px;
        }
        .btn-edit {
            background-color: #ffc107;
            color: white;
            border-radius: 8px;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #007BFF;
        }
        .btn-dashboard {
            background-color: #17a2b8;
            color: white;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container mt-4">
        <div class="header">
            <h2>Welcome to Your Patient Account</h2>
        </div>

        <!-- Account Information Card -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">User Account Details</h4>
            </div>
            <div class="card-body">
                <form>
                    <div class="row mb-3">
                        <label for="username" class="col-sm-2 col-form-label">Username</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="username" value="Ashitha Sreja" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="email" class="col-sm-2 col-form-label">Email</label>
                        <div class="col-sm-10">
                            <input type="email" class="form-control" id="email" value="john.doe@example.com" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="contact" class="col-sm-2 col-form-label">Contact</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="contact" value="123-456-7890" readonly>
                        </div>
                    </div>
                    <button type="button" class="btn btn-edit" onclick="enableEditing()">Edit Info</button>
                </form>
            </div>
        </div>

        <!-- Personal Information Card -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Personal Information</h4>
            </div>
            <div class="card-body">
                <form>
                    <div class="row mb-3">
                        <label for="fullName" class="col-sm-2 col-form-label">Full Name</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="fullName" value="John Doe" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="dob" class="col-sm-2 col-form-label">Date of Birth</label>
                        <div class="col-sm-10">
                            <input type="date" class="form-control" id="dob" value="1990-01-01" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="address" class="col-sm-2 col-form-label">Address</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="address" value="123 Main Street, City, Country" readonly>
                        </div>
                    </div>
                    <button type="button" class="btn btn-edit" onclick="enableEditing()">Edit Info</button>
                </form>
            </div>
        </div>

        <!-- Medical History Card -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Medical History</h4>
            </div>
            <div class="card-body">
                <p class="section-title">Previous Conditions:</p>
                <ul>
                    <li>Asthma (2015)</li>
                    <li>High Blood Pressure (2018)</li>
                    <li>Allergy to Penicillin</li>
                </ul>
                <button type="button" class="btn btn-primary">Add New Condition</button>
            </div>
        </div>

        <!-- Button to Save Changes -->
        <div class="text-center">
            <button type="button" class="btn btn-save" onclick="saveChanges()">Save Changes</button>
        </div>

        <!-- Dashboard Redirect Button -->
        <div class="text-center mt-4">
            <a href="/dashboard" class="btn btn-dashboard">Go to Dashboard</a>
        </div>
    </div>

    <script>
        function enableEditing() {
            document.getElementById('username').readOnly = false;
            document.getElementById('email').readOnly = false;
            document.getElementById('contact').readOnly = false;
            document.getElementById('fullName').readOnly = false;
            document.getElementById('dob').readOnly = false;
            document.getElementById('address').readOnly = false;
        }

        function saveChanges() {
            alert('Changes Saved Successfully!');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
